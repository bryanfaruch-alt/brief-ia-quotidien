name: Brief IA Quotidien

on:
  schedule:
    # Tous les jours à 7h UTC = 8h Paris (heure d'hiver) / 9h (heure d'été)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Permet de lancer manuellement depuis GitHub si besoin

jobs:
  generer-et-envoyer:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Installer les dépendances système (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libcairo2 \
            libfontconfig1 \
            fonts-liberation

      - name: 📦 Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: 🤖 Générer et envoyer le brief
        run: python generate_brief.py
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
