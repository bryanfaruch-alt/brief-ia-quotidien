name: Brief IA Quotidien

on:
  schedule:
    # Tous les jours 횄혻 7h UTC = 8h Paris (heure d'hiver) / 9h (heure d'횄짤t횄짤)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Permet de lancer manuellement depuis GitHub si besoin

jobs:
  generer-et-envoyer:
    runs-on: ubuntu-latest

    steps:
      - name: 챨혺혫짜 R횄짤cup횄짤rer le code
        uses: actions/checkout@v4

      - name: 챨혺혨혥 Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 챨혺혬짠 Installer les d횄짤pendances syst횄짢me (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libcairo2 \
            libfontconfig1 \
            fonts-liberation

      - name: 챨혺혫짝 Installer les d횄짤pendances Python
        run: pip install -r requirements.txt

      - name: 챨혺짚혯 G횄짤n횄짤rer et envoyer le brief
        run: python generate_brief.py
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
