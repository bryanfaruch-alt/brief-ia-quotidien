name: Brief IA Quotidien
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  generer-et-envoyer:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer les dependances systeme
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libfontconfig1 \
            fonts-liberation fonts-noto fonts-noto-extra \
            fonts-symbola
      - name: Installer les dependances Python
        run: pip install -r requirements.txt
      - name: Generer et envoyer le brief
        run: python generate_brief.py
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
